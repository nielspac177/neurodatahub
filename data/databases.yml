- id: openneuro-ds008066
  modality_primary: neuroimaging
  access: open
  license: CC0
  n_subjects: '40'
  provider: OpenNeuro
  doi: 10.18112/openneuro.ds008066.v1.0.0
  data_types:
  - T1w anatomical MRI
  - BOLD fMRI (3 runs)
  - single-band reference images
  - events.tsv
  short_desc_en: BIDS-formatted raw MRI dataset of 40 subjects performing a choice task with six decoy/no-decoy
    conditions (3, 9 or 24 options), providing per participant one T1-weighted anatomical image, three
    BOLD runs with single-band references, and an events.tsv per run.
  short_desc_es: Dataset de MRI cruda en formato BIDS con 40 sujetos que realizaron una tarea de elección
    con seis condiciones (con y sin señuelo, de 3, 9 o 24 opciones), con una imagen anatómica T1w, tres
    runs BOLD con imágenes de referencia single-band y un events.tsv por run para cada participante.
  access_notes: Publicado en OpenNeuro bajo licencia CC0 (snapshot 1.0.0).
  name: Choice Overload fMRI Dataset
  access_confidence: medium
  projects:
  - id: ds008066-p1-loso-decoding
    question_en: Does a multivariate classifier trained to decode option-set size (3 vs 9 vs 24) from
      BOLD activity generalize to held-out subjects and held-out runs, or does it only work within-subject?
    question_es: ¿Un clasificador multivariado entrenado para decodificar el tamaño del conjunto de opciones
      (3 vs 9 vs 24) a partir de la señal BOLD generaliza a sujetos y a corridas no vistas, o solo funciona
      intra-sujeto?
    lens: generalization
    skills:
    - BIDS/fMRIPrep
    - Python (nilearn, scikit-learn)
    - MVPA and cross-validation design
    - basic shell/HPC
    status: open
    unverified: false
    difficulty: 4
    effort_weeks: 15
    feasibility: feasible_with_caveat
    novelty: partial
    still_open_because: 'Reutskaja et al. 2018 (Nat Hum Behav, 10.1038/s41562-018-0440-2) is the canonical
      choice-overload fMRI study and establishes that BOLD in dorsal striatum and ACC varies with option-set
      size — but it is entirely univariate/parametric GLM at the group level (inverted-U of set-size-related
      signal), with no classifier, no single-trial pattern decoding, and no test of whether set size is
      decodable from spatial patterns. Adjacent multivariate work exists only in other domains: a generalizable
      electrophysiological (EEG) signature of working-memory load (10.1111/psyp.13691) and an EEG/HDDM
      study of choice set size in choice overload (10.1016/j.neuroimage.2025.121542) — both EEG, neither
      fMRI MVPA, and the EEG choice-overload paper does not test leave-one-subject-out transfer. Zhang
      et al. (10.1162/jocn_a_01207) report vlPFC value updating by choice-set size, again univariate.
      No located work trains an fMRI classifier to decode 3 vs 9 vs 24 options, and none compares within-subject/within-run
      cross-validation against leave-one-run-out and leave-one-subject-out generalization. The remaining
      delta — whether set-size information is carried in a subject-general spatial code or is idiosyncratic
      (and whether apparent decoding is driven by run-level drift or trial-count/RT confounds) — is genuinely
      unanswered. Note also that Reutskaja used set sizes 6/12/24, not 3/9/24, so the stated dataset may
      be a different collection; the novelty judgment holds either way.'
    prior_work:
    - doi: 10.1038/s41562-018-0440-2
      what_was_done: trabajo previo cercano
  - id: ds008066-p2-structure-function
    question_en: Do individual differences in cortical thickness and surface area of frontoparietal control
      regions, measured from the T1w scan, predict the steepness of each participant's BOLD response to
      increasing option-set size?
    question_es: ¿Las diferencias individuales en grosor cortical y área de superficie de regiones frontoparietales
      de control, medidas en la imagen T1w, predicen la pendiente de la respuesta BOLD de cada participante
      al aumento del número de opciones?
    lens: multimodal
    skills:
    - FreeSurfer recon-all + QC of surfaces
    - first-level and subject-level GLM (nilearn or SPM)
    - regression / mixed models
    - multiple-comparison correction
    status: open
    unverified: false
    difficulty: 4
    effort_weeks: 16
    feasibility: feasible_with_caveat
    novelty: partial
    still_open_because: 'The group-level half is published: Reutskaja et al. 2018 (Nat Hum Behav, 10.1038/s41562-018-0440-2)
      established that BOLD in dorsal striatum and ACC scales non-monotonically (inverted-U) with option-set
      size — so "BOLD response to increasing option-set size" is itself a known, characterized effect,
      and any new analysis must be framed as moderation of an already-described slope, not discovery of
      it. What no located work does is treat the per-participant slope as a phenotype and regress it on
      T1w-derived FreeSurfer morphometry (cortical thickness and surface area) of frontoparietal control
      regions. Structure-function individual-difference designs of exactly this shape exist in other domains
      (e.g. Cercor 2021 10.1093/cercor/bhaa322, independent contributions of dlPFC structure and function
      to working memory; Cercor 2026 10.1093/cercor/bhag089, parietal thickness predicting V5 motion responses),
      which shows the method is standard but has not been applied to set-size sensitivity. Remaining delta:
      (1) no published test of thickness/surface-area prediction of set-size BOLD slope in any dataset,
      and (2) no such analysis on the Choice Overload fMRI Dataset specifically. Two caveats to design
      around before committing a student: the effect is non-monotonic, so a single "steepness" scalar
      is under-specified (need to define slope over the ascending limb, or fit a quadratic and use the
      linear/quadratic coefficients separately); and typical single-site choice-overload samples (n roughly
      20-40) are badly underpowered for brain-structure-to-brain-function individual-difference correlations,
      plus surface-based structure-function correlations carry a documented spurious-correlation risk
      from shared surface reconstruction and smoothing (10.1162/imag_a_00478) that must be explicitly
      controlled.'
    prior_work:
    - doi: 10.1038/s41562-018-0440-2
      what_was_done: trabajo previo cercano
  - id: ds008066-p3-decoy-by-setsize-interaction
    question_en: Because decoy presence and option count were experimentally manipulated in a full 2x3
      design, is the neural effect of adding a decoy causally modulated by set size (i.e., is there a
      decoy x set-size interaction), and where in the brain?
    question_es: Dado que la presencia de senuelo y el número de opciones se manipularon experimentalmente
      en un diseno factorial 2x3 completo, ¿el efecto neural de anadir un senuelo esta causalmente modulado
      por el tamano del conjunto (es decir, existe interaccion senuelo x tamano) y en que regiones?
    lens: causal
    skills:
    - GLM design and contrast specification
    - nilearn or SPM/FSL second-level analysis
    - factorial ANOVA logic
    - cluster-level inference and its pitfalls
    status: open
    unverified: false
    difficulty: 4
    effort_weeks: 13
    feasibility: feasible_with_caveat
    novelty: partial
    still_open_because: 'The dataset''s own source paper — Stanley & Wedell, "Neural Dynamics of Multiattribute
      Decision Making Under Choice Overload," bioRxiv 10.1101/2025.11.18.689103 (2025-11-18, Univ. of
      South Carolina) — is exactly this 2 (decoy present/absent) x 3 (3/9/24 options) fMRI design, so
      the question is not novel in setup. BUT every neural analysis they report deliberately collapses
      the crossed factor: (a) set-size effects are "linear and quadratic contrasts ... tested in separate
      GLMs, averaging across the levels of the second experimental factor (decoy vs no decoy)", with contrast
      vectors literally written as [-1 2 -1 -1 2 -1] and [-1 0 1 -1 0 1] — i.e. decoy-collapsed by construction;
      (b) the decoy effect is a decoy-present > decoy-absent one-sample t-test "collapsing across set
      size". They report main effects only: DLPFC inverse-U and ACC linear with set size; DLPFC + anterior
      insula for decoy > no-decoy (notably NO ACC decoy effect, which they flag as a puzzle). They never
      estimate or report a Decoy x Number interaction contrast anywhere in the imaging analysis, whole-brain
      or ROI. Interaction terms appear only in the BEHAVIORAL data, where they ARE significant (Number
      x Decoy on satisfaction, F(1,51)=5.68, p=.02; on "right number of options", F(1,51)=4.49, p<.05;
      and the decoy effect itself shrinks with set size, F(1,51)=20.32, p<.001) — which makes the untested
      neural interaction a well-motivated, directly predicted gap rather than a fishing expedition. Remaining
      delta: fit the full 2x3 factorial second-level model on this dataset and test the decoy x set-size
      interaction (and simple decoy effects at 3 vs 9 vs 24) in ACC/DLPFC/AIns/striatum, which could also
      explain the paper''s unresolved null ACC decoy effect if the ACC decoy response is set-size-dependent
      and cancels when collapsed. Note also the closest published near-neighbor Reutskaja et al. 2018
      (Nat Hum Behav) manipulated set size only, without a crossed decoy factor.'
    prior_work:
    - doi: 10.1101/2025.11.18.689103
      what_was_done: trabajo previo cercano
  - id: ds008066-p5-tms-target-variability
    question_en: Where are the load-sensitive frontoparietal peaks in this task located in each individual,
      and how far do they shift from the group-average MNI coordinate — i.e., would a group-coordinate
      TMS target actually hit the functionally active tissue in each participant?
    question_es: ¿Dónde se ubican, en cada individuo, los picos frontoparietales sensibles a la carga
      de eleccion, y cuánto se desplazan respecto a la coordenada MNI promedio del grupo? Es decir, ¿un
      blanco de EMT basado en coordenadas grupales realmente alcanzaría el tejido funcionalmente activo
      de cada participante?
    lens: neuromodulation
    skills:
    - individual-level fMRI GLM in native space
    - coordinate-space transforms (MNI <-> native) and their gotchas
    - spatial statistics / dispersion measures
    - TMS/neuronavigation targeting literature
    status: open
    unverified: false
    difficulty: 4
    effort_weeks: 14
    feasibility: feasible_with_caveat
    novelty: partial
    still_open_because: 'The core scientific claim is already established, not open. Sack et al. 2009
      (J Cogn Neurosci, 10.1162/jocn.2009.21126) directly compared individual fMRI-guided TMS targeting
      against group-average Talairach/MNI coordinates, 10-20 positioning, and probabilistic targeting
      for a frontoparietal cognitive task, and showed group coordinates substantially degrade functional
      hit rate and effect size (requiring ~5x the sample). Sparing et al. 2008 (HBM) and Lynch/Dosenbach
      precision-mapping work (10.1016/j.xpro.2023.102118; 10.1016/j.biopsych.2023.11.022) further document
      that individual functional peaks deviate on the order of 1-2 cm from group centroids and that individual-specific
      network targeting is required. The only remaining delta is descriptive and dataset-local: nobody
      has published the per-subject peak coordinates and group-to-individual Euclidean displacement distribution
      for load-sensitive frontoparietal activation specifically in the Choice Overload fMRI Dataset. That
      is a replication of a known effect in a new sample, so it can yield a dataset characterization but
      not a novel finding — the answer ("no, a group coordinate would frequently miss") is predictable
      from prior work. To be genuinely novel the project would need an added angle, e.g. linking individual
      peak displacement to a behavioral choice-overload parameter, or comparing task-peak vs resting-state-network-derived
      targets with an electric-field model in the same subjects.'
    prior_work:
    - doi: 10.1162/jocn.2009.21126
      what_was_done: trabajo previo cercano
