  projects:
  - id: ds005684-loso-color-geometry
    question_en: Does the neural representational geometry of the nine hues generalize across people and
      across the report/no-report context — i.e., can a color-similarity model fit on N-1 participants'
      ventral occipitotemporal patterns predict the held-out participant's behavioral dissimilarity matrix,
      and does a decoder trained on report trials still work on no-report trials?
    question_es: ¿La geometría representacional neural de los nueve matices generaliza entre personas
      y entre contextos de reporte/no-reporte? Es decir, ¿un modelo de similitud de color ajustado en
      N-1 participantes (patrones en corteza occipitotemporal ventral) predice la matriz de disimilitud
      conductual del participante excluido, y un decodificador entrenado en ensayos con reporte sigue
      funcionando en ensayos sin reporte?
    lens: generalization
    skills:
    - BIDS / OpenNeuro data handling
    - fMRIPrep or SPM12 preprocessing
    - nilearn + scikit-learn (searchlight / ROI decoding)
    - representational similarity analysis (RDM construction, Spearman/Mantel tests)
    - permutation testing and leave-one-subject-out cross-validation
    status: open
    unverified: false
    difficulty: 4
    effort_weeks: 15
    feasibility: feasible_with_caveat
    novelty: partial
    still_open_because: 'No paper performs the proposed neural analyses on ds005684. The data descriptor
      itself (Hirao et al., Sci Data 2025, 10.1038/s41597-025-04511-0) contains NO MVPA, NO RSA, and NO
      report/no-report decoder test — its Technical Validation is limited to behavioral split-half/inter-participant
      correlations, FD/tSNR, and a univariate one-sample t-test map. All 7 works citing it were checked:
      none re-analyze the fMRI data for color geometry. The adjacent prior work is (a) Kawakita et al.,
      iScience 2025, "Is my ''red'' your ''red''? Evaluating structural correspondences between color
      similarity judgments using unsupervised alignment" (10.1016/j.isci.2025.112029) plus Tsuchiya-lab
      follow-ups (10.1073/pnas.2415346122; preprint 10.64898/2026.02.13.705699) — these establish cross-individual
      generalization of color qualia geometry BEHAVIORALLY only, never from brain patterns; and (b) Nakagi
      et al., iScience 2025 (10.1016/j.isci.2025.112427), which aligns neural representational structures
      across individuals and brain areas but for natural scenes, not the nine hues, and never predicts
      a held-out participant''s behavioral RDM. Remaining delta: (1) leave-one-participant-out neural
      (VOTC) -> held-out behavioral color RDM prediction has not been done for color in any dataset; (2)
      report -> no-report cross-condition decoder transfer for hue identity is untested — the closest
      no-report structural work (Kirchberger/Tsuchiya-adjacent, 10.1093/nc/niaf053) manipulates spatial
      attention behaviorally for shapes/faces, not hue decoding in fMRI. Caveat for the student: the behavioral-generalization
      half of the question is largely settled, so the contribution must be framed on the neural side,
      and N in ds005684 is small enough that leave-one-out RSA reliability should be power-checked first.'
    prior_work:
