- id: mimic-iv
  name: MIMIC-IV
  version: '3.1'
  modality_primary: clinical
  modality_secondary:
  - waveforms
  diseases:
  - stroke
  - tbi
  - delirium
  - sepsis
  - intracranial-hemorrhage
  disease_category:
  - neurosurgical
  - neurological
  provider: PhysioNet / MIT-LCP
  url: https://physionet.org/content/mimiciv/3.1/
  access: credentialed
  access_notes: Requiere credencial PhysioNet + curso CITI 'Data or Specimens Only Research'.
  license: PhysioNet Credentialed Health Data License 1.5.0
  cost: free
  n_subjects: ~65,000 estancias en UCI / ~180,000 pacientes
  years: 2008-2019
  data_types:
  - EHR
  - signos vitales
  - laboratorios
  - notas clínicas
  - ICD
  - medicación
  region: EE.UU. (Beth Israel Deaconess, Boston)
  short_desc_es: Base de cuidados intensivos de un solo centro, desidentificada, con datos granulares
    de UCI; referencia estándar para modelos predictivos clínicos.
  short_desc_en: Single-center, de-identified critical care database with granular ICU data; the standard
    benchmark for clinical prediction models.
  key_publications:
  - Predicción de mortalidad, sepsis y lesión renal aguda en UCI
  - NLP sobre notas clínicas (extracción, resumen, LLMs clínicos)
  - Estudios de equidad/sesgo algorítmico en modelos de UCI
  last_verified: '2026-07-21'
  tags:
  - benchmark
  - longitudinal
  - single-center
  projects:
  - id: mimic-iv-q1
    question_en: Can acute neurological deterioration (delirium, haemorrhage) be predicted by combining
      clinical notes with waveform signals, and does it externally validate on eICU?
    question_es: ¿Predecir deterioro neurológico agudo (delirium, hemorragia) integrando notas + señales,
      con validación externa en eICU?
    status: open
    unverified: true
    confidence: 0.2
  - id: mimic-iv-q2
    question_en: Do clinical foundation models pre-trained on MIMIC transfer few-shot to neurosurgical
      tasks?
    question_es: ¿Modelos de fundación clínicos preentrenados en MIMIC que transfieran few-shot a tareas
      neuroquirúrgicas?
    status: open
    unverified: true
    confidence: 0.2
  - id: mimic-iv-ntq1
    question_en: Among ICU patients with severe traumatic brain injury and documented intracranial hypertension,
      does early decompressive craniectomy (within 48 h of admission) compared with continued maximal
      medical management change in-hospital survival and the odds of being discharged home rather than
      to a skilled nursing or long-term facility, when the comparison is set up as a target-trial emulation
      with propensity matching on admission GCS, age, pupillary/vital-sign status and injury severity?
    question_es: En pacientes de UCI con traumatismo craneoencefálico grave e hipertensión intracraneal
      documentada, ¿la craniectomía descompresiva precoz (en las primeras 48 h) frente al manejo médico
      máximo continuado modifica la supervivencia intrahospitalaria y la probabilidad de alta a domicilio
      en lugar de a un centro de cuidados prolongados, planteando la comparación como emulación de ensayo
      diana con emparejamiento por puntaje de propensión sobre GCS de ingreso, edad, estado pupilar/hemodinámico
      y gravedad de la lesión?
    difficulty: 4
    effort_weeks: 14
    skills:
    - python
    - statistics
    - causal-inference
    extra_datasets:
    - eicu-crd
    status: open
    unverified: true
    clinical_rationale: RESCUEicp and DECRA left neurosurgeons with the uncomfortable result that craniectomy
      buys survival but often at the cost of severe disability, so real-world data on who actually walks
      out to home rather than to a nursing facility directly informs the consent conversation at 3 a.m.
    outcome_measure: 'In-hospital mortality and discharge disposition (home vs facility) as a proxy for
      dichotomised GOS-E; secondary: ICU length of stay'
    subspecialty: trauma
  - id: mimic-iv-ntq2
    question_en: In severe TBI patients receiving osmotherapy in the ICU, does first-line hypertonic saline
      versus mannitol associate with different in-hospital mortality, ICU length of stay and rate of subsequent
      surgical decompression, after adjustment for baseline GCS, sodium, creatinine and injury severity?
    question_es: En pacientes con TCE grave que reciben osmoterapia en UCI, ¿la elección de suero salino
      hipertónico frente a manitol como primera línea se asocia a distinta mortalidad intrahospitalaria,
      estancia en UCI y tasa de descompresión quirúrgica posterior, tras ajustar por GCS basal, sodio,
      creatinina y gravedad de la lesión?
    difficulty: 3
    effort_weeks: 10
    skills:
    - python
    - statistics
    status: open
    unverified: true
    clinical_rationale: Every neuro-ICU has a house preference between hypertonic saline and mannitol
      despite no definitive trial, and knowing which agent precedes fewer crash craniectomies or renal
      injuries would settle a daily bedside argument.
    outcome_measure: 'In-hospital mortality; secondary: ICU length of stay and rate of subsequent decompressive
      craniectomy'
    subspecialty: trauma
  - id: mimic-iv-ntq3
    question_en: In patients aged 65 and over admitted with traumatic intracranial haemorrhage, does pre-injury
      anticoagulant or antiplatelet therapy predict a worse hospital course — measured as need for craniotomy,
      blood-product transfusion, and in-hospital mortality — and does the association differ between direct
      oral anticoagulants and warfarin?
    question_es: En pacientes de 65 años o más ingresados por hemorragia intracraneal traumática, ¿el
      tratamiento anticoagulante o antiagregante previo a la lesión predice un peor curso hospitalario
      —medido como necesidad de craneotomía, transfusión de hemoderivados y mortalidad intrahospitalaria—
      y difiere la asociación entre anticoagulantes orales directos y warfarina?
    difficulty: 2
    effort_weeks: 8
    skills:
    - python
    - statistics
    extra_datasets:
    - eicu-crd
    status: open
    unverified: true
    clinical_rationale: The anticoagulated elderly fall patient is the single most common neurotrauma
      consult, and whether a DOAC really carries the same haematoma-expansion risk as warfarin determines
      how aggressively we reverse and how long we observe before discharge.
    outcome_measure: 'In-hospital mortality; secondary: craniotomy/craniectomy rate and transfusion requirement'
    subspecialty: trauma
  - id: mimic-iv-ntq4
    question_en: Does the trajectory of the Glasgow Coma Scale over the first 72 ICU hours — its slope
      and variability — predict in-hospital mortality and discharge destination better than the single
      admission GCS in patients with traumatic brain injury?
    question_es: ¿La trayectoria de la escala de coma de Glasgow durante las primeras 72 h en UCI —su
      pendiente y variabilidad— predice mejor la mortalidad intrahospitalaria y el destino al alta que
      el GCS único de ingreso en pacientes con traumatismo craneoencefálico?
    difficulty: 3
    effort_weeks: 10
    skills:
    - python
    - statistics
    extra_datasets:
    - eicu-crd
    status: open
    unverified: true
    clinical_rationale: Prognostic conversations with families still hinge on the admission GCS even though
      clinicians instinctively trust the trend more, and quantifying how much the 72-hour trajectory adds
      would change when withdrawal-of-care discussions are appropriate.
    outcome_measure: In-hospital mortality and discharge disposition; model comparison by AUC/net reclassification
      versus admission GCS alone
    subspecialty: trauma
  descriptor_doi: 10.1038/s41597-022-01899-x
  doi: 10.13026/6mm1-ek67
  access_steps:
  - step_en: Create a free PhysioNet account
    step_es: Crea una cuenta gratuita en PhysioNet
    url: https://physionet.org/register/
    eta_en: 5 min
    eta_es: 5 min
  - step_en: Complete the CITI 'Data or Specimens Only Research' course and upload the certificate
    step_es: Completa el curso CITI 'Data or Specimens Only Research' y sube el certificado
    eta_en: 4-6 h
    eta_es: 4-6 h
  - step_en: Submit the credentialing request; a human reviews it
    step_es: Envía la solicitud de credencial; la revisa una persona
    eta_en: 3-14 days
    eta_es: 3-14 días
  - step_en: Sign the data use agreement on the project page, then download
    step_es: Firma el acuerdo de uso en la página del proyecto y descarga
    eta_en: 10 min
    eta_es: 10 min
  starter_code:
    python: 'import pandas as pd


      # Tras descargar y descomprimir el volcado con credencial.

      adm = pd.read_csv(''mimiciv/hosp/admissions.csv.gz'')

      dx  = pd.read_csv(''mimiciv/hosp/diagnoses_icd.csv.gz'')


      # Ingresos con un diagnóstico cerebrovascular (ICD-10 I60-I69)

      stroke = dx[dx.icd_code.str.startswith((''I60'',''I61'',''I62'',''I63''), na=False)]

      print(adm.merge(stroke, on=''hadm_id'').subject_id.nunique(), ''pacientes'')'
    r: 'library(data.table)

      adm <- fread(''mimiciv/hosp/admissions.csv.gz'')

      dx  <- fread(''mimiciv/hosp/diagnoses_icd.csv.gz'')

      stroke <- dx[grepl(''^I6[0-3]'', icd_code)]

      length(unique(merge(adm, stroke, by=''hadm_id'')$subject_id))'
- id: eicu-crd
  name: eICU Collaborative Research Database
  version: '2.0'
  modality_primary: clinical
  modality_secondary: []
  diseases:
  - stroke
  - tbi
  - sepsis
  - delirium
  disease_category:
  - neurosurgical
  - neurological
  provider: PhysioNet / Philips eICU
  url: https://physionet.org/content/eicu-crd/2.0/
  access: credentialed
  access_notes: Credencial PhysioNet + curso CITI.
  license: PhysioNet Credentialed Health Data License 1.5.0
  cost: free
  n_subjects: ~200,000 ingresos, 335 UCIs, ~200 hospitales
  years: 2014-2015
  data_types:
  - EHR
  - signos vitales
  - laboratorios
  - APACHE
  - medicación
  region: EE.UU. (multicéntrico)
  short_desc_es: Base multicéntrica de UCI de EE.UU.; ideal para validación externa y estudios de generalización
    entre hospitales.
  short_desc_en: Multi-center US ICU database; ideal for external validation and cross-hospital generalization
    studies.
  key_publications:
  - Validación externa de modelos entrenados en MIMIC
  - Benchmarks de mortalidad y severidad multicéntricos
  last_verified: '2026-07-21'
  tags:
  - benchmark
  - multi-center
  projects:
  - id: eicu-crd-q1
    question_en: Which models generalise from one hospital to another, and which collapse under site shift?
    question_es: ¿Qué modelos generalizan de un hospital a otro y cuáles colapsan por cambio de dominio
      (site shift)?
    status: open
    unverified: true
    confidence: 0.2
  - id: eicu-crd-ntq1
    question_en: Does a simple bedside prognostic model for severe TBI built on MIMIC-IV (age, GCS motor
      score, first-day vitals and labs) retain its calibration and discrimination when applied across
      the ~200 hospitals of eICU, and which hospital characteristics predict where the model over- or
      under-estimates mortality?
    question_es: ¿Un modelo pronóstico sencillo de cabecera para TCE grave construido en MIMIC-IV (edad,
      componente motor del GCS, constantes y laboratorios del primer día) mantiene su calibración y discriminación
      al aplicarse a los ~200 hospitales de eICU, y qué características del hospital predicen dónde el
      modelo sobre- o subestima la mortalidad?
    difficulty: 3
    effort_weeks: 12
    skills:
    - python
    - statistics
    extra_datasets:
    - mimic-iv
    status: open
    unverified: true
    clinical_rationale: Prognostic scores are quoted to families as if they were universal, but a model
      that is well calibrated in a Boston academic ICU and badly miscalibrated in a small community ICU
      would systematically mislead exactly the units with least neurotrauma experience.
    outcome_measure: In-hospital mortality, reported as discrimination (AUC) and calibration (slope/intercept)
      per hospital
    subspecialty: trauma
  - id: eicu-crd-ntq2
    question_en: How much do ICUs vary in their early management of severe TBI — use of osmotherapy, deep
      sedation and vasopressors in the first 24 hours — and does that between-hospital variation explain
      differences in risk-adjusted mortality after accounting for APACHE score and admission GCS?
    question_es: ¿Cuánto varían las UCI en el manejo precoz del TCE grave —uso de osmoterapia, sedación
      profunda y vasopresores en las primeras 24 h— y explica esa variación entre hospitales las diferencias
      en mortalidad ajustada por riesgo tras tener en cuenta el APACHE y el GCS de ingreso?
    difficulty: 3
    effort_weeks: 12
    skills:
    - python
    - statistics
    extra_datasets:
    - mimic-iv
    status: open
    unverified: true
    clinical_rationale: If risk-adjusted TBI mortality differs several-fold between ICUs that follow the
      same guidelines, the difference is a modifiable process-of-care problem rather than case mix, which
      is precisely the argument for regionalising neurotrauma care.
    outcome_measure: Risk-adjusted in-hospital mortality, modelled with hospital-level random effects
      (median odds ratio)
    subspecialty: trauma
  descriptor_doi: 10.1038/sdata.2018.178
  doi: 10.13026/C2WM1R
  access_steps:
  - step_en: Same PhysioNet credentialing as MIMIC-IV — do it once, it covers both
    step_es: 'Misma credencial PhysioNet que MIMIC-IV: se hace una vez y sirve para ambas'
    url: https://physionet.org/settings/credentialing/
    eta_en: see MIMIC-IV
    eta_es: ver MIMIC-IV
  - step_en: Sign the eICU-specific data use agreement
    step_es: Firma el acuerdo de uso específico de eICU
    eta_en: 10 min
    eta_es: 10 min
  starter_code:
    python: 'import pandas as pd


      pat = pd.read_csv(''eicu/patient.csv.gz'')

      # unitvisitnumber > 1 marca reingresos a UCI

      print(pat.groupby(''hospitalid'').size().describe())'
