      what_was_done: trabajo previo cercano
  - id: ds005684-hue-test-predicts-decoding
    question_en: Do out-of-scanner perceptual and affective phenotypes predict in-scanner neural color
      coding — specifically, does a participant's ND-100 Hue discrimination score (and Ishihara score,
      STAI, BDI-II, sleepiness) explain between-subject variance in the fidelity of hue decoding and in
      behavior-brain RDM correspondence?
    question_es: ¿Los fenotipos perceptivos y afectivos medidos fuera del escáner predicen la codificación
      neural del color dentro del escáner? En concreto, ¿la puntuación del test ND-100 Hue (y el Ishihara,
      STAI, BDI-II y somnolencia) explica la varianza entre sujetos en la fidelidad de decodificación
      del matiz y en la correspondencia entre las matrices de disimilitud conductual y neural?
    lens: multimodal
    skills:
    - nilearn ROI decoding (reusing derivatives)
    - 'regression with small-n inference: bootstrap CIs, permutation tests, no p-hacking'
    - questionnaire psychometrics
    - honest reporting of effect-size uncertainty
    status: open
    unverified: false
    difficulty: 4
    effort_weeks: 14
    feasibility: feasible_with_caveat
    novelty: partial
    still_open_because: 'No paper links out-of-scanner phenotypes to in-scanner neural color coding in
      this dataset. Prior work covers the two halves separately: (1) the data descriptor itself, Nakagawa/Tsuchiya
      et al., "A neuroimaging dataset during sequential color qualia similarity judgments with and without
      reports," Sci Data 2025 (10.1038/s41597-025-04511-0), releases ds005684 and reports that each participant''s
      hue discriminability was measured outside the scanner, but performs only technical-validation analyses
      — no hue decoding, no behavior-brain RDM correspondence, and no individual-difference regression
      on the hue/questionnaire scores; a EuropePMC citation/full-text search returned the descriptor as
      the ONLY record mentioning ds005684, i.e. no downstream analysis paper exists yet. (2) Individual
      differences in color qualia structure have been characterized purely behaviorally by Kawakita/Tsuchiya
      et al., "Is my ''red'' your ''red''?", iScience 2025 (10.1016/j.isci.2025.112029) and the 2026 preprint
      "Robust individual alignment of color qualia structures" (10.64898/2026.02.13.705699), which align
      per-subject behavioral color similarity structures (including color-atypical observers) but never
      touch fMRI. (3) Neural-side individual variability via unsupervised alignment exists for natural
      scenes, not color (10.1016/j.isci.2025.112427). Remaining delta: nobody has tested whether ND-100
      Hue / Ishihara scores, or affective-state measures (STAI, BDI-II, sleepiness), explain between-subject
      variance in hue decoding fidelity or in behavior-brain RDM correspondence. Two caveats for the student:
      verify that STAI/BDI-II/sleepiness are actually in the ds005684 participants.tsv (the descriptor
      abstract mentions only the hue test), and note that N=35 with a restricted, mostly color-normal
      Ishihara range gives low power for individual-difference correlations — the effect would need to
      be large to detect.'
    prior_work:
    - doi: 10.1016/j.isci.2025.112029
      what_was_done: trabajo previo cercano
  - id: ds005684-report-act-causal-contrast
    question_en: 'What is the causal effect of the act of reporting on the neural representation of color
      qualia? Because the circle/square cue randomly assigns each trial to report or no-report, the report
      minus no-report contrast is a within-subject randomized manipulation: which regions carry hue information
      in both conditions (candidate qualia correlates) versus only when a report is required (post-perceptual/reporting
      correlates), and does prefrontal activity statistically mediate the report-related change in ventral
      hue decoding?'
    question_es: '¿Cuál es el efecto causal del acto de reportar sobre la representacion neural de las
      qualia de color? Dado que la clave (circulo/cuadrado) asigna cada ensayo a reporte o no-reporte,
      el contraste reporte menos no-reporte es una manipulación aleatorizada intrasujeto: ¿que regiones
      contienen informacion de matiz en ambas condiciones (candidatas a correlato de la quale) frente
      a solo cuando se exige un reporte (correlatos post-perceptivos/de reporte), y media la actividad
      prefrontal el cambio en la decodificacion ventral asociado al reporte?'
    lens: causal
    skills:
    - single-trial GLM (LSS) beta series
    - MVPA / searchlight information mapping
    - mediation analysis (bootstrapped indirect effects) on within-subject data
    - careful handling of motion confounds (report trials contain a trackball response)
    - writing about the no-report paradigm literature
    status: open
    unverified: false
    difficulty: 5
    effort_weeks: 20
    feasibility: feasible_with_caveat
    novelty: partial
    still_open_because: 'The general report vs no-report NCC logic is well-trodden — Frässle et al. 2014
      (10.1523/JNEUROSCI.4627-13.2014) showed frontal activity in binocular rivalry tracks report/introspection
      rather than perception, and Tsuchiya et al. 2015 TICS (10.1016/j.tics.2015.10.002) codified the
      no-report paradigm; Cogitate/adversarial-collaboration work (10.1038/s41586-025-08888-1) revisits
      frontal vs posterior NCC with report-free conditions. But all of these operate on presence/absence
      of a percept (rivalry, masking, face/object visibility), not on decodable low-level content. Searches
      turned up only the data descriptor itself for ds005684 (10.1038/s41597-025-04511-0, preprint 10.1101/2024.05.16.594267),
      with no citing analysis papers indexed. So three specific deltas remain: (1) applying the report/no-report
      contrast to hue-identity MVPA/RSA rather than to visibility, i.e. asking which regions carry *color
      content* in both conditions; (2) treating the trial-wise circle/square cue as a genuine within-subject
      randomized manipulation and estimating a causal (not merely descriptive) report effect; (3) the
      formal mediation test of whether prefrontal activity accounts for the report-related change in ventral
      hue decoding — no located work runs a mediation model linking PFC to content-decoding strength.
      Adjacent enough that framing must cite Frässle/Tsuchiya, but the content-level causal + mediation
      analysis on this dataset appears undone.'
    prior_work:
    - doi: 10.1523/JNEUROSCI.4627-13.2014
      what_was_done: trabajo previo cercano
  - id: ds005684-age-sex-color-geometry
    question_en: Is the structure of color-similarity experience stable across adult age and sex? Using
      the 21-59 year age range and near-balanced sex split, how much do behavioral dissimilarity geometry,
      ND-100 hue discrimination, and data quality (framewise displacement, tSNR) vary with age and sex
      — and, given n=31 usable participants, what effect sizes could this dataset actually detect?
    question_es: ¿Es estable la estructura de la experiencia de similitud de color a lo largo de la edad
      adulta y entre sexos? Usando el rango de 21 a 59 años y la división casi equilibrada por sexo, ¿cuánto
      varían la geometría conductual de disimilitud, la discriminación de matiz (ND-100) y la calidad
      de los datos (desplazamiento por fotograma, tSNR) con la edad y el sexo, y qué tamaños de efecto
      puede realmente detectar este dataset con n=31 participantes utilizables?
    lens: equity
    skills:
    - multidimensional scaling / Procrustes alignment of individual RDMs
    - linear models with age and sex, plus sensitivity/power analysis
