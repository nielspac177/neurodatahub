  starter_code:
    python: "# OpenNeuro ds005684 - color qualia similarity fMRI (BIDS 1.9.0)\n# Layout documented in\
      \ the data descriptor: participant dirs (e.g. \"sub-01\"),\n# four session dirs per participant,\
      \ each with \"anat\" and \"func\";\n# func contains task fMRI plus event timing files.\nfrom pathlib\
      \ import Path\n\nROOT = Path(\"ds005684\")  # dataset root after download\n\nsubjects = sorted(p.name\
      \ for p in ROOT.glob(\"sub-*\") if p.is_dir())\nprint(f\"{len(subjects)} subjects:\", subjects[:5])\n\
      \nfor sub in subjects:\n    sessions = sorted(p.name for p in (ROOT / sub).glob(\"ses-*\") if p.is_dir())\n\
      \    anat = list((ROOT / sub).glob(\"ses-*/anat/*.nii*\"))   # T1w MPRAGE\n    func = list((ROOT\
      \ / sub).glob(\"ses-*/func/*.nii*\"))   # task EPI runs\n    events = list((ROOT / sub).glob(\"\
      ses-*/func/*_events.tsv\"))\n    print(sub, len(sessions), \"sessions |\",\n          len(anat),\
      \ \"anat |\", len(func), \"func |\", len(events), \"events\")\n\n# Inspect one events file (trial\
      \ timing, report / no-report condition)\nimport pandas as pd\nfirst_events = next(ROOT.glob(\"sub-*/ses-*/func/*_events.tsv\"\
      ))\nprint(pd.read_csv(first_events, sep=\"\\t\").head())\n"
    r: "# OpenNeuro ds005684 - color qualia similarity fMRI (BIDS 1.9.0)\n# Layout: sub-*/ses-*/{anat,func};\
      \ func holds task fMRI + *_events.tsv\nroot <- \"ds005684\"  # dataset root after download\n\nsubjects\
      \ <- list.dirs(root, recursive = FALSE, full.names = FALSE)\nsubjects <- sort(subjects[grepl(\"\
      ^sub-\", subjects)])\ncat(length(subjects), \"subjects\\n\")\n\nfor (sub in subjects) {\n  sess\
      \  <- list.dirs(file.path(root, sub), recursive = FALSE, full.names = FALSE)\n  sess  <- sess[grepl(\"\
      ^ses-\", sess)]\n  anat  <- Sys.glob(file.path(root, sub, \"ses-*\", \"anat\", \"*.nii*\"))\n  func\
      \  <- Sys.glob(file.path(root, sub, \"ses-*\", \"func\", \"*.nii*\"))\n  evs   <- Sys.glob(file.path(root,\
      \ sub, \"ses-*\", \"func\", \"*_events.tsv\"))\n  cat(sub, length(sess), \"sessions |\", length(anat),\
      \ \"anat |\",\n      length(func), \"func |\", length(evs), \"events\\n\")\n}\n\n# Inspect one events\
      \ file\nev <- Sys.glob(file.path(root, \"sub-*\", \"ses-*\", \"func\", \"*_events.tsv\"))[1]\nhead(read.delim(ev,\
