  name: Scientific Creativity MRI Dataset
  access_confidence: high
  projects:
  - id: ds008055-p3-within-subject-contrast-causal
    question_en: Because task-SCT contains an experimenter-manipulated matched control condition, what
      is the within-subject effect of the creative-generation manipulation on BOLD response and its temporal
      dynamics across a run, and how much of that effect survives when order, run number and time-on-task
      are modeled as confounds?
    question_es: Dado que la task-SCT incluye una condición de control emparejada manipulada experimentalmente,
      ¿cuál es el efecto intrasujeto de la manipulación de generacion creativa sobre la respuesta BOLD
      y su dinámica temporal a lo largo del run, y cuánto de ese efecto persiste al modelar el orden,
      el número de run y el tiempo en tarea como confusores?
    lens: causal
    skills:
    - GLM design and HRF modeling
    - linear mixed-effects models (subject as random effect)
    - within-subject / repeated-measures inference
    - careful reading of events.tsv timing semantics
    - Python (nilearn) or FSL/SPM
    status: open
    unverified: false
    difficulty: 5
    effort_weeks: 16
    feasibility: feasible_with_caveat
    novelty: partial
    still_open_because: 'The dataset is OpenNeuro ds008055 "Scientific Creativity MRI Dataset" (Luchini
      & Beaty, 2026; task-rest + task-SCT), and the primary analysis of exactly this paradigm is already
      published: Beaty, Cortes, Merseal, Hardiman & Green, "Brain networks supporting scientific creative
      thinking," Psychology of Aesthetics, Creativity, and the Arts (2025), DOI 10.1037/aca0000603 — ~47
      STEM undergraduates, scientific hypothesis-generation blocks contrasted against an experimenter-matched
      synonym-generation control task, with univariate contrasts plus whole-brain MVPA identifying default
      (PCC), salience (right anterior insula) and executive-control contributions. So the core "within-subject
      effect of the creative-generation manipulation on BOLD" is PUBLISHED and re-deriving it is largely
      replication. The remaining delta is the second half of the question: (a) the within-run TEMPORAL
      DYNAMICS of the generation-vs-control effect (time-resolved/parametric time-in-block or time-in-run
      modulation of the contrast) is not reported in aca0000603 — the closest work is a different lab/paradigm
      (verbal divergent thinking, "The time course of creativity: multivariate classification of default
      and executive network contributions over time," Cortex 2022, S0010945222002404), which used a different
      task and dataset; and (b) no published analysis quantifies how much of the SCT generation effect
      SURVIVES when block/condition order, run number and cumulative time-on-task are entered as nuisance
      regressors — i.e. a confound-robustness / sensitivity analysis of the published effect. Framing
      the project as "temporal dynamics + confound-hardening of an already-published contrast" is defensible;
      framing it as discovering the generation-vs-control effect is not.'
    prior_work:
    - doi: 10.1037/aca0000603
      what_was_done: trabajo previo cercano
