    - explicit reporting of demographic limits (single-site Japanese volunteer sample, no reported ethnicity
      variable)
    status: open
    unverified: false
    difficulty: 3
    effort_weeks: 11
    feasibility: feasible_with_caveat
    novelty: partial
    still_open_because: 'Both halves of the question exist in adjacent form, but not on this dataset and
      not jointly. (1) Age-dependence of color-similarity structure is already published by the same group:
      Kawakita et al., "Comparing color qualia structures through a similarity task in young children
      versus adults" (10.1073/pnas.2415346122), plus the explicit exchange "Do color similarity judgments
      vary with age, and do they reveal anything about qualia?" (10.1073/pnas.2521506122) and the reply
      (10.1073/pnas.2525916122) — however these contrast children vs adults, not within-adult variation
      across 21-59 y. (2) Sex differences in ND-100 hue discrimination are published in an independent
      356-student cohort (10.3389/fpsyg.2025.1722974), but with no link to similarity geometry or neuroimaging.
      (3) Individual-level alignment of color qualia structures among adults exists (10.64898/2026.02.13.705699)
      but does not model age/sex as predictors. (4) The ds005684 descriptor (10.1038/s41597-025-04511-0)
      reports FD/tSNR QC but performs no demographic moderation. Remaining delta: nobody has tested within-adult
      age/sex moderation of behavioral dissimilarity geometry AND ND-100 scores AND fMRI QC metrics in
      this specific cohort, nor reported the sensitivity/minimum-detectable-effect analysis for n=31 —
      which is likely to be the main finding (an underpowered null / precision statement), a modest but
      genuinely unfilled contribution.'
