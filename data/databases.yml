- id: openneuro-ds008064
  modality_primary: neuroimaging
  access: open
  license: CC0
  n_subjects: '28'
  provider: OpenNeuro
  doi: 10.18112/openneuro.ds008064.v1.0.0
  diseases:
  - treatment-resistant depression
  data_types:
  - T1-weighted anatomical MRI
  - T2-weighted anatomical MRI
  - Diffusion-weighted imaging (DTI)
  - 'Functional MRI (fMRI): Goal priming task'
  - Resting-state fMRI
  species: human
  short_desc_en: OpenNeuro CC0 dataset with structural, diffusion and functional MRI from 28 participants
    with treatment-resistant depression scanned before and after six weeks of active or sham rTMS combined
    with psychotherapy.
  short_desc_es: Dataset de OpenNeuro con licencia CC0 que incluye MRI estructural, de difusión y funcional
    de 28 participantes con depresión resistente al tratamiento, adquirida antes y después de seis semanas
    de rTMS activa o simulada combinada con psicoterapia.
  name: Individualized fMRI-guided rTMS combined with Self-System Therapy versus mindfulness exercises
    in treatment-resistant depression (OpenNeuro ds008064)
  access_confidence: medium
  projects:
  - id: ds008064-p2-dwi-structural-support
    question_en: Is the individualized functional rTMS target also structurally connected to subgenual
      ACC, i.e. does DTI-derived white-matter connectivity from the target voxel to sgACC agree with the
      resting-state functional target in the same subject?
    question_es: ¿El blanco funcional individualizado de rTMS está además conectado estructuralmente al
      CCA subgenual, es decir, la conectividad de sustancia blanca derivada de DTI entre el vóxel blanco
      y el CCA subgenual coincide con el blanco funcional de reposo en el mismo sujeto?
    lens: multimodal
    skills:
    - diffusion MRI preprocessing (eddy/topup or QSIPrep)
    - probabilistic tractography (MRtrix3 or FSL)
    - functional connectivity in nilearn
    - multimodal spatial overlap statistics
    status: open
    unverified: false
    difficulty: 5
    effort_weeks: 18
    feasibility: feasible_with_caveat
    novelty: partial
    still_open_because: 'The core comparison has already been done in adjacent form. Vila-Rodriguez-adjacent
      work "Reproducible routes: reliably navigating the connectome to enrich personalized brain stimulation
      strategies" (Front Hum Neurosci 2024, doi:10.3389/fnhum.2024.1477049) derived, in the same individuals
      and at two timepoints, (1) FC-guided DLPFC targets from resting-state fMRI (sgACC-anticorrelation
      approach) and (2) SC-guided DLPFC targets from DTI tractography, and explicitly quantified intra-individual
      differences between the two target maps, concluding SC-guided targets are more reproducible. Related
      priors: Luber et al. 2022 (doi:10.1016/j.neuroimage.2021.118863) on DTI-based targeting of deep
      structures from cortical TMS sites, and Brainsight-era work on cingulum-bundle DLPFC-sgACC tracts
      and rTMS outcome (e.g. doi:10.1038/s41386-021-01256-3; doi:10.1016/j.jad.2021.12.005). Remaining
      delta specific to ds008064: (a) no published study has run the structural-vs-functional target concordance
      analysis in a treatment-resistant depression cohort where the functional target was actually used
      to deliver clinical rTMS, so the prior work never links target discordance to clinical response;
      (b) prior work compared *optimal target locations*, not the narrower question posed here — whether
      the actually-stimulated functional target voxel has non-trivial DTI streamline connectivity to sgACC
      in that same subject (a per-subject validity check rather than a target-generation comparison);
      (c) ds008064 pairs this with a psychotherapy (SST) vs mindfulness arm, allowing structure-function
      target agreement to be tested as a moderator of combined-treatment outcome, which no prior work
      has done. Confirm ds008064 actually ships usable DWI (with sufficient directions/b-values) before
      committing — if it is a low-angular-resolution DTI sequence, the tractography arm may be too weak
      to distinguish agreement from noise.'
    prior_work:
    - doi: 10.3389/fnhum.2024.1477049
      what_was_done: trabajo previo cercano
  - id: ds008064-p3-goal-priming-pre-post
    question_en: Within subjects, how does brain activation to the goal-priming task (match versus mismatch,
      promotion versus prevention conditions) change from before to after the six-week rTMS-plus-psychotherapy
      protocol, and how large is that change relative to the task's own test-retest noise?
    question_es: Dentro de cada sujeto, ¿cómo cambia la activación cerebral ante la tarea de priming de
      metas (coincidencia frente a no coincidencia, condiciones de promoción frente a prevención) desde
      antes hasta después del protocolo de seis semanas de rTMS más psicoterapia, y qué tamaño tiene ese
      cambio frente al propio ruido test-retest de la tarea?
    lens: causal
    skills:
    - BIDS events handling
    - task-fMRI GLM (nilearn or SPM)
    - within-subject / paired second-level modeling
    - reliability statistics and effect-size reporting
    status: open
    unverified: false
    difficulty: 4
    effort_weeks: 18
    feasibility: feasible_with_caveat
    novelty: partial
    still_open_because: Davis, Beynel, Neacsiu, Luber, Bernhardt, Lisanby & Strauman (2023, Int J Clin
      Health Psychol, 10.1016/j.ijchp.2023.100382) analyze exactly this cohort and exactly this idiographic
      goal-priming task before and after the combined rTMS/psychotherapy protocol — so the pre-post design
      is not new. But that paper reports task-based *functional connectivity/connectome* change at the
      network level (DMN, cerebellum, limbic hyperconnectivity; fronto-parietal/visual hypoconnectivity,
      normalizing toward healthy-volunteer patterns). It does not report univariate BOLD activation for
      the task's own design contrasts (match vs mismatch crossed with promotion vs prevention), and it
      provides no reliability benchmark. Related prior work characterizes those activation contrasts only
      cross-sectionally in single sessions (Strauman et al. 2007, 10.1162/jocn.2007.19.7.1152; Eddington
      et al. 2009, 10.1093/scan/nsp016; Detloff et al. 2020, 10.1017/pen.2019.13). The remaining delta
      is (a) within-subject pre-post change in the match/mismatch x promotion/prevention activation contrasts
      themselves, and (b) scaling that change against the task's own test-retest noise (e.g., ICC / within-subject
      SDC from the repeated sessions, including the non-rTMS-active comparison arm as a change-free reference)
      — no published work estimates reliability for this task, so effect sizes for treatment-related activation
      change are currently uninterpretable.
    prior_work:
    - doi: 10.1016/j.ijchp.2023.100382
      what_was_done: trabajo previo cercano
  - id: ds008064-p4-external-validity-of-mdd-signatures
    question_en: Do published resting-state functional-connectivity signatures of major depression, derived
      on large non-refractory cohorts, still separate these 28 treatment-resistant patients from open
      normative control data, or do they fail out of domain?
    question_es: ¿Las firmas publicadas de conectividad funcional en reposo para la depresión mayor, derivadas
      de grandes cohortes no refractarias, siguen separando a estos 28 pacientes resistentes al tratamiento
      de datos normativos abiertos de control, o fallan fuera de dominio?
    lens: generalization
    skills:
    - parcellation and connectome extraction (nilearn, Schaefer/Power atlases)
    - site-effect harmonization (ComBat)
    - scikit-learn evaluation, calibration and permutation testing
    - careful reporting of small-N limitations
    status: open
    unverified: false
    difficulty: 4
    effort_weeks: 14
    feasibility: feasible_with_caveat
    novelty: partial
    still_open_because: 'The core claim — that rs-fMRI connectivity signatures of MDD degrade badly when
      moved out of their training domain — is already well established, so the headline finding would
      be a confirmation, not a discovery. Yamashita et al. 2020 (PLoS Biol, 10.1371/journal.pbio.3000966)
      built MDD network markers on large multi-site cohorts and explicitly tested transfer to fully independent
      cohorts and other disorders; Yamashita/Ichikawa 2020 (10.3389/fpsyt.2020.00400) quantified the multi-center
      generalization gap directly; Flint et al. 2021 (10.1038/s41386-021-01020-7) showed depression-classifier
      accuracies are systematically overestimated and collapse toward chance out of sample; Dinga et al.
      2019 (10.1016/j.nicl.2019.101674, preprint 10.1101/416321) failed to replicate the Drysdale connectivity
      biotypes. The remaining delta is narrow and mostly a special case: none of these tested transfer
      specifically into a *treatment-resistant*, heavily medicated, rTMS-trial-enrolled sample (a clinical
      stage shift, not just a site shift), and none paired patients with controls pulled from a *separate*
      open dataset. That pairing is also the design''s fatal weakness — with ds008064 patients (n=28)
      and controls from a different acquisition, scanner/site/protocol is perfectly confounded with diagnosis,
      so a "signature still separates groups" result is uninterpretable and a "fails out of domain" result
      is unattributable between clinical-stage effects and site effects. To be publishable the delta would
      need reframing (e.g. multiple independent control datasets to bound the site-effect term, or normative-modeling
      deviation scores rather than raw classification), and n=28 gives very little power to say anything
      precise about degradation magnitude.'
    prior_work:
    - doi: 10.1371/journal.pbio.3000966
      what_was_done: trabajo previo cercano
  - id: ds008064-p5-foundation-model-fewshot
    question_en: Can a pretrained fMRI foundation model produce embeddings of these resting-state scans
      stable enough that a session-1 scan can be re-identified from its session-2 counterpart, and do
      those embeddings beat conventional connectome features in a few-shot pre-versus-post classification?
    question_es: ¿Puede un modelo de fundación de fMRI preentrenado producir representaciones de estos
      escaneos en reposo lo bastante estables como para reidentificar un escaneo de sesión 1 a partir
      de su homólogo de sesión 2, y superan esas representaciones a los rasgos convencionales de conectoma
      en una clasificación pre-frente-a-post de pocos ejemplos?
    lens: foundation-models
    skills:
    - PyTorch
    - using pretrained timeseries/fMRI foundation models
    - linear probing and few-shot evaluation protocols
    - subject-wise cross-validation without leakage
    - embedding-space analysis
    status: open
    unverified: false
    difficulty: 5
    effort_weeks: 16
    feasibility: feasible_with_caveat
    novelty: partial
    still_open_because: 'Both halves of the question have close, recent antecedents, so the framing is
      not new — but neither has been done on longitudinal clinical treatment data.


      (1) Embedding-vs-connectome head-to-head is largely pre-answered, and negatively. "The Variance
      Brain Foundation Models Forgot: Third-Order Statistics Predict Cognition Where Billion-Parameter
      Models Fail" (arXiv:2606.04010, May 2026) tests three state-of-the-art brain foundation models (incl.
      BrainLM 111M and 650M) against a plain linear readout of the ~80K-parameter FC matrix and finds
      BFM embeddings lose on every dataset, parcellation and readout, with the gap *widening* with model
      scale; it attributes this to pretraining destroying the third-order co-skewness structure. So "do
      foundation-model embeddings beat conventional connectome features" already has a published answer
      for phenotype prediction. Related benchmark work: "Foundation models for discovering robust biomarkers
      of neurological disorders from dynamic functional connectivity", "A Brain Graph Foundation Model",
      AdaBrain-Bench.


      (2) Embedding-based fingerprinting/re-identification is also established, just not with a pretrained
      foundation model: Finn-style connectome fingerprinting plus learned-embedding versions — "Functional
      connectome fingerprinting: identifying individuals and predicting cognitive functions via autoencoder"
      (10.1002/hbm.25394), the deep-learning variant on arXiv, tangent-space fingerprinting (10.1162/netn_a_00445),
      and stability-over-months work (10.1523/JNEUROSCI.0480-21.2021).


      Specific remaining delta: (a) no paper found that reports session-1/session-2 identification rate
      for embeddings from an off-the-shelf pretrained fMRI foundation model (BrainLM / Brain-JEPA / BrainMass
      class) used as an embedding-QC criterion; the BFM-vs-FC literature evaluates phenotype prediction,
      not identifiability. (b) No work on ds008064 (Duke fMRI-guided rTMS + Self-System Therapy TRD trial;
      only conventional network analyses exist, e.g. 10.1016/j.ijchp.2023.100382, 10.1097/YCT.0000000000000545).
      (c) Few-shot *within-subject pre- vs post-treatment state* classification — a different target from
      the cross-subject cognition/diagnosis prediction that all BFM benchmarks use — is untested.


      Caveat for the student: given arXiv:2606.04010, the expected result on the comparison arm is that
      FC wins, and ds008064 is a small trial (n in the tens, two sessions), so the few-shot arm will likely
      be underpowered to publish as a positive claim. Framing it as a clinical-longitudinal reliability/negative-result
      replication of the BFM-vs-FC finding is the defensible angle; framing it as a novel discovery is
      not.'
    prior_work:
    - doi: 10.48550/arXiv.2606.04010
      what_was_done: trabajo previo cercano
