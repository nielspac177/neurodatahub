      what_was_done: trabajo previo cercano
  - id: ds005684-foundation-model-rdm-benchmark
    question_en: Do representations from pretrained vision and vision-language foundation models predict
      human color-similarity brain activity better than classical colorimetric models? Benchmark model-derived
      RDMs for the nine calibrated hues (CIE/HSV distance, CNN and CLIP-style embeddings of the color
      patches) against the behavioral dissimilarity RDM and the ventral occipitotemporal neural RDM, in
      both report and no-report trials.
    question_es: ¿Las representaciones de modelos de fundacion de vision y vision-lenguaje predicen la
      actividad cerebral durante juicios de similitud de color mejor que los modelos colorimetricos clasicos?
      Comparar matrices de disimilitud derivadas de modelos para los nueve matices calibrados (distancia
      CIE/HSV, embeddings tipo CNN y CLIP de los parches de color) frente a la matriz conductual y a la
      matriz neural occipitotemporal ventral, en ensayos con y sin reporte.
    lens: foundation-models
    skills:
    - representational similarity analysis and model comparison (variance partitioning, noise ceiling
      estimation)
    - PyTorch feature extraction from open-weight pretrained models
    - color science basics (sRGB, HSV, CIE uniform color spaces)
    - nilearn ROI/searchlight analysis
    - clear framing of what a model-brain RDM correlation does and does not license
    status: open
    unverified: false
    difficulty: 4
    effort_weeks: 16
    feasibility: feasible_with_caveat
    novelty: partial
    still_open_because: 'The BEHAVIORAL half is already well covered. Kawakita et al. 2024 (Sci Rep, 10.1038/s41598-024-65604-1)
      aligned human color-similarity structures (93 colors) against LLM-derived color similarity structures
      using Gromov-Wasserstein optimal transport, and Marjieh et al. 2024 (Sci Rep, 10.1038/s41598-024-72071-1)
      showed GPT-family models (including a vision-co-trained GPT-4) predict human pairwise color similarity,
      explicitly comparing text-only vs. visual-input models and recovering the color-wheel geometry against
      classical color-space structure. Related work also exists benchmarking DNN color coding (10.1371/journal.pone.0253442)
      and MEG color-space geometry (10.1016/j.cub.2020.10.062). What remains genuinely open: (1) no published
      work links foundation-model image embeddings (CNN / CLIP-style patch embeddings) to a NEURAL color
      RDM in human ventral occipitotemporal cortex — the prior model-vs-human comparisons are behavior-only;
      (2) ds005684 (Hirao et al. 2025, 10.1038/s41597-025-04511-0) has only its own data-descriptor technical
      validation and no reuse papers found in EuropePMC (query "ds005684" OR "color qualia similarity"
      returned only the descriptor, its preprint, and an unrelated methods paper); (3) the report vs.
      no-report contrast — i.e., whether model-RDM fit to vOT is driven by the reporting/decision process
      or survives without overt report — has no precedent in this literature. Note the nine-hue stimulus
      set is small (36 pairs), which limits power to separate CIE/HSV from CNN/CLIP RDMs, so the neural
      + no-report angle, not the behavioral benchmark, is where the novelty lies.'
    prior_work:
    - doi: 10.1038/s41598-024-65604-1
      what_was_done: trabajo previo cercano
