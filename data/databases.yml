# Campos de acceso: open | registration | credentialed | dua | application
# modality_primary: clinical | neuroimaging | genetics | electrophysiology | bci | multimodal | aggregator

- id: mimic-iv
  name: MIMIC-IV
  version: "3.1"
  modality_primary: clinical
  modality_secondary: [waveforms]
  diseases: [stroke, tbi, delirium, sepsis, intracranial-hemorrhage]
  disease_category: [neurosurgical, neurological]
  provider: PhysioNet / MIT-LCP
  url: https://physionet.org/content/mimiciv/3.1/
  access: credentialed
  access_notes: "Requiere credencial PhysioNet + curso CITI 'Data or Specimens Only Research'."
  license: PhysioNet Credentialed Health Data License 1.5.0
  cost: free
  n_subjects: "~65,000 estancias en UCI / ~180,000 pacientes"
  years: "2008-2019"
  data_types: [EHR, signos vitales, laboratorios, notas clínicas, ICD, medicación]
  region: "EE.UU. (Beth Israel Deaconess, Boston)"
  short_desc_es: "Base de cuidados intensivos de un solo centro, desidentificada, con datos granulares de UCI; referencia estándar para modelos predictivos clínicos."
  short_desc_en: "Single-center, de-identified critical care database with granular ICU data; the standard benchmark for clinical prediction models."
  key_publications:
    - "Predicción de mortalidad, sepsis y lesión renal aguda en UCI"
    - "NLP sobre notas clínicas (extracción, resumen, LLMs clínicos)"
    - "Estudios de equidad/sesgo algorítmico en modelos de UCI"
  open_questions:
    - "¿Predecir deterioro neurológico agudo (delirium, hemorragia) integrando notas + señales, con validación externa en eICU?"
    - "¿Modelos de fundación clínicos preentrenados en MIMIC que transfieran few-shot a tareas neuroquirúrgicas?"
  last_verified: "2026-07-21"
  tags: [benchmark, longitudinal, single-center]

