      degree of peritumoural oedema relative to lesion volume, lesion multiplicity, necrotic core fraction)
      best distinguish a solitary metastasis from a glioblastoma or an atypical meningioma before surgery?
    question_es: En las cohortes de meningioma y metástasis cerebral de BraTS, ¿qué descriptores de RM
      (contacto dural, grado de edema peritumoral relativo al volumen de la lesión, multiplicidad, fracción
      de núcleo necrótico) distinguen mejor una metástasis solitaria de un glioblastoma o un meningioma
      atípico antes de la cirugía?
    difficulty: 3
    effort_weeks: 8
    skills:
    - python
    - statistics
    - neuroimaging
    extra_datasets:
    - tcia
    status: open
    unverified: true
    clinical_rationale: A solitary metastasis, a glioblastoma and an atypical meningioma each send the
      patient down a different path — systemic workup for a primary, en-bloc versus piecemeal resection,
      or Simpson-grade planning — and the call is often made on the preoperative MRI alone.
    outcome_measure: Preoperative diagnostic classification accuracy against the reference tumour-type
      label (AUC, confusion matrix, sensitivity for metastasis)
    subspecialty: tumor
  - id: brats-q6
    question_en: Does a volumetric prognostic threshold for enhancing tumour burden derived in one BraTS
      contributing institution still separate long- from short-survivors when applied unchanged to patients
      from the other institutions and scanners?
    question_es: ¿Un umbral volumétrico pronóstico de carga tumoral realzante derivado en una institución
      contribuyente de BraTS sigue separando supervivientes largos de cortos al aplicarse sin cambios
      a pacientes de las demás instituciones y escáneres?
    difficulty: 4
