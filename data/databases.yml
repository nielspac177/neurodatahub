  starter_code:
    python: "# ds008108 - BIDS layout documented in the dataset README (src e2, section 5).\n# Root contains\
      \ README.md, dataset_description.json and sub-*/ folders;\n# each subject has ses-preSleep, ses-nightSleep,\
      \ ses-postSleep, ses-preNap, ses-postNap.\nimport json\nfrom pathlib import Path\n\nROOT = Path(\"\
      /path/to/ds008108\")  # local copy of the downloaded dataset\n\n# 1. dataset-level metadata\nwith\
      \ open(ROOT / \"dataset_description.json\") as f:\n    print(json.load(f))\n\n# 2. subjects and\
      \ their sessions\nsubjects = sorted(p.name for p in ROOT.glob(\"sub-*\") if p.is_dir())\nprint(len(subjects),\
      \ \"subjects\")  # README reports 142 participants\nfor ses in (\"ses-preSleep\", \"ses-nightSleep\"\
      , \"ses-postSleep\", \"ses-preNap\", \"ses-postNap\"):\n    print(ses, sum((ROOT / s / ses).is_dir()\
      \ for s in subjects))\n\n# 3. nocturnal PSG is stored as .edf under ses-nightSleep\nedfs = sorted(ROOT.glob(\"\
      sub-*/ses-nightSleep/**/*.edf\"))\nprint(len(edfs), \"PSG EDF files;\", edfs[:3])\n\n# 4. behavioral\
      \ task metrics are .tsv, one set per waking session\ntsvs = sorted(ROOT.glob(\"sub-*/ses-*/beh/*.tsv\"\
      ))\nprint(len(tsvs), \"behavioral TSV files;\", tsvs[:3])\n\n# 5. T1w anatomical and resting-state\
      \ functional scans live in ses-postNap\nanat = sorted(ROOT.glob(\"sub-*/ses-postNap/anat/*\"))\n\
      func = sorted(ROOT.glob(\"sub-*/ses-postNap/func/*\"))\nprint(len(anat), \"anat files;\", len(func),\
      \ \"func files\")\n"
    r: "# ds008108 - BIDS layout documented in the dataset README (src e2, section 5).\nroot <- \"/path/to/ds008108\"\
      \  # local copy of the downloaded dataset\n\n# 1. dataset-level metadata\nmeta <- jsonlite::fromJSON(file.path(root,\
      \ \"dataset_description.json\"))\nstr(meta)\n\n# 2. subjects and their sessions\nsubjects <- sort(basename(list.dirs(root,\
      \ recursive = FALSE)))\nsubjects <- subjects[grepl(\"^sub-\", subjects)]\ncat(length(subjects),\
      \ \"subjects\\n\")  # README reports 142 participants\nsessions <- c(\"ses-preSleep\", \"ses-nightSleep\"\
      , \"ses-postSleep\", \"ses-preNap\", \"ses-postNap\")\nfor (ses in sessions) {\n  cat(ses, sum(dir.exists(file.path(root,\
      \ subjects, ses))), \"\\n\")\n}\n\n# 3. nocturnal PSG is stored as .edf under ses-nightSleep\nedfs\
      \ <- list.files(file.path(root, subjects, \"ses-nightSleep\"),\n                   pattern = \"\\\
      \\.edf$\", recursive = TRUE, full.names = TRUE)\ncat(length(edfs), \"PSG EDF files\\n\")\n\n# 4.\
      \ behavioral task metrics are .tsv, one set per waking session\ntsvs <- list.files(file.path(root,\
      \ subjects), pattern = \"\\\\.tsv$\",\n                   recursive = TRUE, full.names = TRUE)\n\
      beh <- tsvs[grepl(\"/beh/\", tsvs)]\ncat(length(beh), \"behavioral TSV files\\n\")\nif (length(beh))\
      \ head(read.delim(beh[1], sep = \"\\t\"))\n\n# 5. T1w anatomical and resting-state functional scans\
      \ live in ses-postNap\nanat <- list.files(file.path(root, subjects, \"ses-postNap\", \"anat\"),\
      \ full.names = TRUE)\nfunc <- list.files(file.path(root, subjects, \"ses-postNap\", \"func\"), full.names\
      \ = TRUE)\ncat(length(anat), \"anat files;\", length(func), \"func files\\n\")\n"
