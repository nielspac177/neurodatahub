  short_desc_en: BIDS-formatted multimodal dataset from 142 participants (OSA patients and matched healthy
    controls) with behavioral, polysomnography, MRI and questionnaire data across five sessions spanning
    a 24-hour test-retest protocol.
  short_desc_es: Conjunto multimodal en formato BIDS de 142 participantes (pacientes con apnea obstructiva
    del sueño y controles sanos emparejados) con datos conductuales, polisomnografía, MRI y cuestionarios
    en cinco sesiones de un protocolo test-retest de 24 horas.
  access_notes: Released under CC0; cite the dataset descriptor publication and the Dataset DOI when using
    the data.
  name: A Comprehensive Multimodal Dataset for Investigating Cognitive Impairment in Obstructive Sleep
    Apnea (OpenNeuro ds008108)
  access_confidence: high
  projects:
  - id: ds008108-p1-session-shift-generalization
    question_en: Does a behavioral classifier that separates OSA patients from matched controls using
      the cognitive battery (PVT, SART, PPT, MST) trained on one session generalize to the other three
      sessions, or is 'cognitive impairment in OSA' only detectable at specific circadian/post-sleep timepoints?
    question_es: ¿Un clasificador conductual que separa pacientes con AOS de controles emparejados usando
      la batería cognitiva (PVT, SART, PPT, MST), entrenado en una sesión, generaliza a las otras tres,
      o el 'deterioro cognitivo en AOS' solo es detectable en momentos circadianos/post-sueño concretos?
    lens: generalization
    skills:
    - Python/pandas
    - scikit-learn
    - leave-subject-out cross-validation design
    - psychometrics of reaction-time data
    status: open
    unverified: false
    difficulty: 3
    effort_weeks: 12
    feasibility: feasible_with_caveat
    novelty: partial
    still_open_because: 'No paper trains a multivariate classifier separating OSA patients from matched
      controls on the PVT/SART/PPT/MST battery, and none tests train-on-one-session / test-on-other-sessions
      generalization; nothing found cites or reuses OpenNeuro ds008108. Existing work is adjacent and
      univariate: Djonlagic et al. (10.5664/jcsm.3692) and the CPAP follow-up (10.5664/jcsm.5794), plus
      10.1371/journal.pone.0085918 and 10.5664/jcsm.8210, show OSA motor-sequence-learning deficits are
      timepoint-specific (overnight consolidation impaired, encoding largely spared), and 10.1007/s00702-015-1501-6
      reviews group-level PVT/attention deficits. Deep-learning work on sustained attention in OSA (10.1007/s41782-021-00190-0)
      uses brain MRI, not the behavioral battery, with no cross-session analysis. Remaining delta: (a)
      subject-level discriminative classification from behavioral features rather than group-mean comparisons,
      and (b) an explicit session-transfer matrix quantifying whether the OSA signature is circadian/post-sleep-locked
      or session-invariant.'
    prior_work:
    - doi: 10.5664/jcsm.3692
      what_was_done: trabajo previo cercano
  - id: ds008108-p2-psg-to-overnight-cognitive-change
    question_en: Which PSG-derived sleep-architecture features (stage proportions, arousal-linked events,
      spectral power) predict the within-subject overnight change in vigilance (PVT) and memory (PPT/MST),
      and does the same feature set predict the change across the afternoon nap in the same person?
    question_es: ¿Qué características de arquitectura del sueño derivadas de la PSG (proporciones de estadios,
      eventos ligados a microdespertares, potencia espectral) predicen el cambio intrasujeto nocturno
      en vigilancia (PVT) y memoria (PPT/MST), y ese mismo conjunto predice el cambio a través de la siesta
      vespertina en la misma persona?
    lens: causal
    skills:
    - MNE-Python or YASA
    - EDF/PSG signal processing
    - mixed-effects models (statsmodels/lme4)
    - within-subject difference-score design
    status: open
    unverified: false
    difficulty: 4
    effort_weeks: 15
    feasibility: feasible_with_caveat
    novelty: partial
    still_open_because: 'Both halves are individually published, but not the combination. Mullins et al.,
      SLEEP 2023 (10.1093/sleep/zsad087) already tests NREM slow-oscillation/delta power and slow/fast
      spindle density as correlates of OVERNIGHT declarative memory change (word-pair task pre/post PSG)
      in older adults with OSA vs controls; the Djonlagic line (10.1371/journal.pone.0034106; 10.1371/journal.pone.0085918;
      10.1513/annalsats.202204-315oc) covers fragmentation-driven motor and emotional consolidation in
      sleep-disordered breathing. Separately, fragmentation/stage-shift metrics predict attentional slowing
      in OSA (10.3390/jpm16020117, 2026), but cross-sectionally, not as a within-subject overnight delta.
      Remaining delta: (1) no prior work applies ONE unified feature set (stage proportions + arousal-linked
      events + spectral power) jointly to BOTH vigilance (PVT) and memory (PPT/MST) overnight change in
      the same cohort, so shared-vs-dissociable predictor structure across cognitive domains is untested;
      (2) no prior work tests whether that same feature set predicts change across an AFTERNOON NAP in
      the SAME individuals. Existing nap-vs-night within-person work (10.1111/jsr.12968, Manoach group)
      establishes only feature-level correspondence (nap spindle density estimates nocturnal spindle density),
      not that the feature-to-cognitive-change mapping generalizes across sleep-episode type. That cross-episode
      generalization test is the novel contribution ds008108 enables.'
    prior_work:
    - doi: 10.1093/sleep/zsad087
      what_was_done: trabajo previo cercano
  - id: ds008108-p4-sleep-eeg-signatures-as-stimulation-targets
    question_en: Are there sleep-EEG signatures in the nocturnal PSG (slow-wave activity, spindle density
      and coupling, spectral slope) that track overnight memory consolidation and rs-fMRI network reorganization
      well enough to serve as candidate targets for closed-loop acoustic or transcranial stimulation in
      OSA?
    question_es: ¿Existen firmas de EEG de sueño en la PSG nocturna (actividad de ondas lentas, densidad
      y acoplamiento de husos, pendiente espectral) que sigan la consolidación de memoria nocturna y la
      reorganización de redes en rs-fMRI lo bastante bien como para ser dianas candidatas de estimulación
      acústica o transcraneal en lazo cerrado en la AOS?
    lens: neuromodulation
    skills:
    - sleep-EEG spectral analysis and spindle/slow-oscillation detection (YASA)
    - phase-amplitude coupling
    - signal-quality QC on clinical PSG
    - regression with subject-level random effects
    status: open
    unverified: false
    difficulty: 5
    effort_weeks: 24
    feasibility: feasible_with_caveat
    novelty: partial
    still_open_because: 'The EEG-half of the question is already answered. Djonlagic et al., "Overnight
      declarative memory consolidation and non-rapid eye movement sleep electroencephalographic oscillations
      in older adults with obstructive sleep apnea" (SLEEP 2023, 10.1093/sleep/zsad087) directly tested
      SWA, spindle density and SO-spindle coupling against overnight memory retention in OSA. Parekh et
      al., "EEG slow oscillations and overnight spatial navigational memory performance in CPAP-treated
      obstructive sleep apnea" (SLEEP 2025, 10.1093/sleep/zsaf046) repeats this for SOs; "Association
      between sleep microarchitecture and cognition in obstructive sleep apnea" (SLEEP 2024, 10.1093/sleep/zsae141),
      Zhang et al. (JCM 2023, 10.3390/jcm12020634) and the pediatric spindle work (10.1016/j.ejpn.2018.02.003)
      cover spindle-cognition links; region-specific hd-EEG + memory change after CPAP is covered by 10.1093/sleep/zsad255.
      Remaining delta, none of which any retrieved paper does: (1) no study links these PSG microstructural
      metrics to rs-fMRI network reorganization (DMN/FPN/salience) measured in the same OSA participants
      — existing OSA rs-fMRI work (e.g. 10.3389/fneur.2023.1215882, 10.1002/brb3.70698) is imaging-only
      with no concurrent sleep-EEG or overnight memory task; (2) the aperiodic/1-f spectral slope has
      not been evaluated as a consolidation-related marker in OSA (spectral-slope work in OSA is confined
      to sleep-depth staging, 10.1093/sleep/zsaf130); (3) no closed-loop acoustic or transcranial stimulation
      study exists in OSA at all — the closed-loop literature (10.1093/sleep/zsad206, 10.3390/brainsci8120204)
      is in healthy sleepers, so an explicit effect-size-based target-nomination analysis for OSA is unclaimed.
      Framing the project as a tri-modal (PSG microstructure -> overnight memory -> rs-fMRI network change)
      mediation plus stimulation-target feasibility analysis in ds008108 preserves novelty; framing it
      as "do SWA/spindles predict overnight memory in OSA" does not.'
    prior_work:
    - doi: 10.1093/sleep/zsad087
      what_was_done: trabajo previo cercano
  - id: ds008108-p5-ssl-pretrain-psg-fewshot
    question_en: Does self-supervised pretraining on the 142 unlabeled full-night PSG recordings yield
      representations that beat a supervised baseline in the low-label regime (10-30 labeled subjects)
      on OSA-vs-control classification and on prediction of next-morning PVT vigilance decline?
    question_es: ¿El preentrenamiento autosupervisado sobre los 142 registros de PSG nocturna sin etiquetar
      produce representaciones que superen a una línea base supervisada en régimen de pocas etiquetas
      (10-30 sujetos) en la clasificación AOS-vs-control y en la predicción del descenso de vigilancia
      (PVT) a la mañana siguiente?
    lens: foundation-models
    skills:
    - PyTorch
    - self-supervised learning (contrastive / masked prediction on time series)
    - EEG epoching and normalization
    - few-shot evaluation with strict subject-level splits
    status: open
    unverified: false
    difficulty: 5
    effort_weeks: 24
    feasibility: feasible_with_caveat
    novelty: partial
    still_open_because: 'The core methodological claim is already established, not open. Banville et al.,
      "Uncovering the structure of clinical EEG signals with self-supervised learning" (J Neural Eng 2021,
      doi:10.1088/1741-2552/abca18) explicitly demonstrated that SSL pretext tasks on unlabeled sleep
      EEG beat fully-supervised baselines precisely in the low-labeled-subject regime, with performance
      gaps that close as labels increase — the exact experimental design proposed here. Subsequent work
      has generalized it: a multimodal sleep foundation model pretrained on large unlabeled PSG (Nat Med
      2026, doi:10.1038/s41591-025-04133-4), label-efficient SSL decoding of wearable physiology (doi:10.1038/s44172-025-00467-6),
      and OSA-specific SSL (Self-Supervised Speech Representations for Sleep Apnea Severity Prediction,
      doi:10.1109/tbme.2026.3656326; AcceleRest masked autoencoder, doi:10.64898/2026.01.28.26345056).
      Two genuine deltas remain: (1) no published work uses ds008108 at all — zero hits for the accession
      or its dataset description; (2) prediction of next-morning PVT vigilance decline from PSG-derived
      SSL representations is unaddressed — searches for PSG + PVT + ML returned only protocols, cohort
      descriptions and conference abstracts, no predictive-modeling paper. Caveat for the student: 142
      recordings is one to three orders of magnitude below the corpora used in the SSL-beats-supervised
      literature, so a null result would be uninformative about SSL and merely confirm the known scaling
      requirement; the defensible framing is the PVT-decline target (a novel label) and benchmarking against
      an off-the-shelf sleep foundation model rather than re-running the settled SSL-vs-supervised label-efficiency
      comparison.'
    prior_work:
    - doi: 10.1088/1741-2552/abca18
      what_was_done: trabajo previo cercano
