name: Weekly dataset scan

# Corre cada domingo 06:00 UTC + permite disparo manual desde la pestaña Actions.
on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run discovery scan
        env:
          OPENALEX_MAILTO: ${{ secrets.OPENALEX_MAILTO }}
        run: python scripts/research_update.py --days 14 --max-per-query 5

      - name: Rebuild site data
        run: python scripts/build.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: weekly dataset scan"
          branch: bot/weekly-scan
          delete-branch: true
          title: "🔄 Weekly dataset scan"
          body-path: data/candidates.md
          labels: automated, review-needed
          add-paths: |
            data/candidates.json
            data/candidates.md
            data/databases.json
