name: Weekly dataset scan

# Domingo 06:00 UTC + disparo manual desde la pestaña Actions.
#
# CADENCIA: este job corre SEMANALMENTE porque es gratis y es lo que mantiene
# el catálogo al día — enlaces vivos, términos de acceso vigentes, preguntas
# que alguien pudo haber cerrado. El enriquecimiento (el que cuesta tokens)
# es MENSUAL y se lanza a mano; ver RUNBOOK.md §2.
#
# Este job es la mitad DETERMINISTA del pipeline: enumera, deduplica, tría y
# valida. No necesita ninguna clave de API y nunca escribe en
# data/databases.yml.
on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      backfill:
        description: "Recorrido histórico en vez de incremental"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Calibrar el triaje antes de usarlo
        # Control positivo: si el léxico dejara caer en 'rejected' una base ya
        # publicada, está mal calibrado y descartaría descubrimientos buenos
        # en silencio. Falla el job antes de escribir nada.
        run: python scripts/calibrate_triage.py

      - name: Descubrimiento (enumeración + dedup + triaje)
        env:
          OPENALEX_MAILTO: ${{ secrets.OPENALEX_MAILTO }}
        run: |
          python scripts/harvest_run.py \
            ${{ inputs.backfill && '--backfill --limit 400' || '' }}

      - name: Salud de enlaces y cambios en términos de acceso
        # No falla el job: un portal caído un domingo no debe bloquear el
        # escaneo. Lo que hace es acumular racha de fallos y levantar
        # access_recheck, que reaudit_queue.py convierte en prioridad.
        run: python scripts/audit_links.py || true

      - name: Cola de re-auditoría (delta de citas + antigüedad)
        run: python scripts/reaudit_queue.py --top 20 || true

      - name: Validar el catálogo
        run: python scripts/build.py --check

      - name: Verificar contraste WCAG de los tokens
        run: python scripts/check_contrast.py

      - name: Abrir PR de revisión
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: escaneo semanal de datasets"
          branch: bot/weekly-scan
          delete-branch: true
          title: "🔄 Escaneo semanal de datasets"
          body-path: reports/latest-scan.md
          labels: automated, review-needed
          # El HTML generado NO va aquí: está en .gitignore y lo reconstruye
          # deploy-pages.yml. Sólo se commitea el estado del descubrimiento.
          add-paths: |
            state/
            queue/
            reports/
            data/databases.json
            data/projects.json
            data/stats.json
