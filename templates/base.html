<!DOCTYPE html>
<html lang="{{lang}}" data-page="{{page}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{title}}</title>
<meta name="description" content="{{description}}">
<meta name="color-scheme" content="dark light">
<link rel="alternate" hreflang="{{alt_lang}}" href="{{alt_href}}">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='13' font-size='13'>&#129504;</text></svg>">
<link rel="stylesheet" href="{{root}}assets/css/tokens.css?v={{asset_v}}">
<link rel="stylesheet" href="{{root}}assets/css/base.css?v={{asset_v}}">
<link rel="stylesheet" href="{{root}}assets/css/layout.css?v={{asset_v}}">
<link rel="stylesheet" href="{{root}}assets/css/components.css?v={{asset_v}}">
<script>
/* Fija el tema antes del primer pintado para que no haya parpadeo. */
try{var t=localStorage.getItem('ndh-theme');if(t==='light'||t==='dark')document.documentElement.dataset.theme=t;}catch(e){}
</script>
</head>
<body>
<a class="skip-link" href="#main">{{skip}}</a>

<header class="site-header">
  <div class="container site-header__inner">
    <a class="wordmark" href="{{root}}">Neuro<em>DataHub</em></a>
    <nav class="site-nav" aria-label="{{nav_label}}">
      <a href="{{href_datasets}}" {{current_datasets}}>{{nav_datasets}}</a>
      <a href="{{href_projects}}" {{current_projects}}>{{nav_projects}}</a>
      <a href="{{href_packs}}" {{current_packs}}>{{nav_packs}}</a>
      <a href="{{href_compare}}" {{current_compare}}>{{nav_compare}}</a>
    </nav>
    <div class="header-tools">
      <a class="btn btn--ghost" href="{{alt_href}}" lang="{{alt_lang}}" hreflang="{{alt_lang}}">{{lang_switch}}</a>
      <button class="btn btn--ghost" type="button" id="theme-toggle" aria-pressed="false">
        <span aria-hidden="true">◐</span><span class="visually-hidden">{{theme_label}}</span>
      </button>
    </div>
  </div>
</header>

<main id="main" tabindex="-1">
{{main}}
</main>

<footer class="site-footer">
  <div class="container">
    <p class="prose">{{footer}}</p>
  </div>
</footer>

<p class="visually-hidden" id="a11y-live" role="status" aria-live="polite" aria-atomic="true"></p>
{{data_islands}}
<script type="module" src="{{root}}assets/js/main.js?v={{asset_v}}"></script>
</body>
</html>
